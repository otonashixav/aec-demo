name: Build Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4
    - name: build
      run: |
        (Get-Content CMakeLists.txt).Replace('C:/Users/manis/aec_demo/', 'C:/') | Set-Content CMakeLists.txt
        C:/vcpkg/vcpkg.exe install portaudio:x64-windows
        C:/vcpkg/vcpkg.exe install speexdsp:x64-windows
        cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        cmake --build build --config Release
        cp "C:/vcpkg/installed/x64-windows/bin/*.dll" "build/Release"
    - uses: actions/upload-artifact@v7
      with:
        path: "build/Release"
